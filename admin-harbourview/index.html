<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─── RESET ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─── CONFIG: adjust these to match your Coda doc ──────── */
  :root {
    --bg:           #f7f6f3;
    --card-bg:      #ffffff;
    --card-border:  #e8e4dc;
    --card-hover:   #faf9f7;
    --text-primary: #1a1916;
    --text-muted:   #6b6760;
    --green:        #2d7a4f;
    --green-bg:     #edf7f2;
    --amber:        #b45309;
    --amber-bg:     #fef3e2;
    --red:          #b91c1c;
    --red-bg:       #fef2f2;
    --radius:       10px;
    --font:         'DM Sans', sans-serif;
    --mono:         'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    padding: 14px;
    min-height: 100vh;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 680px;
  }

  /* ─── CARD ──────────────────────────────────────────────── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.12s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .card:hover {
    background: var(--card-hover);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    transform: translateY(-1px);
  }

  .card:hover .arrow {
    opacity: 1;
    transform: translateX(0);
  }

  .card:active {
    transform: translateY(0);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  /* ─── CARD HEADER ───────────────────────────────────────── */
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-icon {
    font-size: 16px;
    line-height: 1;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    flex: 1;
  }

  .arrow {
    font-size: 12px;
    color: var(--text-muted);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  /* ─── STATUS LINE ───────────────────────────────────────── */
  .card-value {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .card-sub {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* ─── STATUS BADGE ──────────────────────────────────────── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    width: fit-content;
    margin-top: 2px;
  }

  .badge.green  { background: var(--green-bg);  color: var(--green); }
  .badge.amber  { background: var(--amber-bg);  color: var(--amber); }
  .badge.red    { background: var(--red-bg);    color: var(--red); }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .green  .badge-dot { background: var(--green); }
  .amber  .badge-dot { background: var(--amber); }
  .red    .badge-dot { background: var(--red); }

  /* ─── LOADING / ERROR ───────────────────────────────────── */
  .card.loading .card-value { 
    background: #eee; 
    border-radius: 4px; 
    color: transparent;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 1; }
  }

  .card.error .card-value { color: var(--red); font-size: 12px; }

  /* ─── STAGGERED ENTRY ───────────────────────────────────── */
  .card {
    animation: cardIn 0.3s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ────────────────────────────────────────── */
  @media (max-width: 420px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LOGIC
     ═══════════════════════════════════════════════════════════ -->
<script>
const BASE = "https://coda.io/apis/v1";

// ── Helpers ──────────────────────────────────────────────────
const headers = () => ({ "Authorization": `Bearer ${CONFIG.API_TOKEN}` });

function fmt(dateStr) {
  if (!dateStr) return null;
  // Handle NZ/AU dd/mm/yyyy format from Coda
  let d;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateStr)) {
    const [day, month, year] = dateStr.split("/");
    d = new Date(`${year}-${month}-${day}`);
  } else {
    d = new Date(dateStr);
  }
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString("en-NZ", { day: "numeric", month: "short", year: "numeric" });
}

function fmtTime(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  return d.toLocaleTimeString("en-NZ", { hour: "2-digit", minute: "2-digit", hour12: true });
}

function parseDate(dateStr) {
  if (!dateStr) return null;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateStr)) {
    const [day, month, year] = dateStr.split("/");
    return new Date(`${year}-${month}-${day}`);
  }
  return new Date(dateStr);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now  = new Date(); now.setHours(0,0,0,0);
  const then = parseDate(dateStr); then.setHours(0,0,0,0);
  return Math.round((then - now) / 86400000);
}

function badge(text, tone) {
  return `<div class="badge ${tone}"><span class="badge-dot"></span>${text}</div>`;
}

function statusTone(days) {
  if (days === null) return "amber";
  if (days < 0)   return "red";
  if (days < 30)  return "amber";
  return "green";
}

function setCard(id, done) {
  document.getElementById(`card-${id}`).classList.remove("loading");
}

function setError(id, msg) {
  document.getElementById(`card-${id}`).classList.replace("loading","error");
  document.getElementById(`val-${id}`).textContent = msg;
}

// Cache of table name → id resolved from the tables list
const _tableIdCache = {};

async function resolveTableId(nameOrId) {
  if (_tableIdCache[nameOrId]) return _tableIdCache[nameOrId];
  if (/^(grid-|tu-|table-)/.test(nameOrId)) return nameOrId;
  // Paginate through all tables
  let pageToken = null;
  const allTables = [];
  do {
    const url = `${BASE}/docs/${CONFIG.DOC_ID}/tables?limit=200` + (pageToken ? `&pageToken=${pageToken}` : "");
    const res  = await fetch(url, { headers: headers() });
    const data = await res.json();
    allTables.push(...(data.items || []));
    pageToken = data.nextPageToken || null;
  } while (pageToken);
  // Try exact match first, then trimmed, then includes
  const match = 
    allTables.find(t => t.name === nameOrId) ||
    allTables.find(t => t.name.trim() === nameOrId.trim()) ||
    allTables.find(t => t.name.toLowerCase().includes(nameOrId.toLowerCase())) ||
    allTables.find(t => nameOrId.toLowerCase().includes(t.name.toLowerCase()));
  if (match) {
    _tableIdCache[nameOrId] = match.id;
    return match.id;
  }
  throw new Error(`Table not found: "${nameOrId}" (searched ${allTables.length} tables)`);
}

async function fetchRows(tableId, query = "") {
  const resolvedId = await resolveTableId(tableId);
  const url = `${BASE}/docs/${CONFIG.DOC_ID}/tables/${encodeURIComponent(resolvedId)}/rows?useColumnNames=true&limit=500${query}`;
  const res  = await fetch(url, { headers: headers() });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`${res.status} — table: "${tableId}" (id: ${resolvedId}) — ${body.slice(0,120)}`);
  }
  const data = await res.json();
  return data.items || [];
}

// ── 1. Next Governance Meeting ────────────────────────────────
async function loadMeeting() {
  try {
    const rows = await fetchRows(CONFIG.TABLE_EVENTS);
    const now  = new Date();
    const govRows = rows
      .filter(r => {
        const cat   = r.values[CONFIG.COLUMNS.eventCategory] || "";
        const start = r.values[CONFIG.COLUMNS.eventStart];
        return String(cat).toLowerCase().includes("governance") && start && new Date(start) >= now;
      })
      .sort((a,b) => new Date(a.values[CONFIG.COLUMNS.eventStart]) - new Date(b.values[CONFIG.COLUMNS.eventStart]));

    document.getElementById("card-meeting").href = CONFIG.LINKS.meeting;

    if (!govRows.length) {
      document.getElementById("val-meeting").textContent = "No upcoming meetings scheduled";
      document.getElementById("sub-meeting").textContent = "";
      setCard("meeting");
      return;
    }

    const next  = govRows[0];
    const start = next.values[CONFIG.COLUMNS.eventStart];
    const name  = next.values[CONFIG.COLUMNS.eventName] || "Governance meeting";
    const days  = daysUntil(start);
    const tone  = days <= 0 ? "red" : days <= 30 ? "amber" : "green";
    const label = days < 0  ? `${Math.abs(days)} days overdue` 
                : days === 0 ? "Today" 
                : `In ${days} day${days===1?"":"s"}`;

    document.getElementById("val-meeting").textContent = `${name} — ${fmt(start)}, ${fmtTime(start)}`;
    document.getElementById("sub-meeting").innerHTML   = badge(label, tone);
    setCard("meeting");
  } catch(e) {
    setError("meeting", `Could not load — ${e.message}`);
  }
}

// ── 2. Insurance Renewal ──────────────────────────────────────
async function loadInsurance() {
  try {
    const rows = await fetchRows(CONFIG.TABLE_DOCUMENTS);
    document.getElementById("card-insurance").href = CONFIG.LINKS.insurance;

    const insRows = rows
      .filter(r => {
        const type   = r.values[CONFIG.COLUMNS.docType] || "";
        const expiry = r.values[CONFIG.COLUMNS.docExpiry];
        return String(type).toLowerCase().includes("insurance") && expiry;
      })
      .sort((a,b) => new Date(b.values[CONFIG.COLUMNS.docExpiry]) - new Date(a.values[CONFIG.COLUMNS.docExpiry]));

    if (!insRows.length) {
      document.getElementById("val-insurance").textContent = "No insurance document with expiry date on file";
      document.getElementById("badge-insurance").innerHTML = badge("⚠️ Attention needed", "amber");
      setCard("insurance");
      return;
    }

    const latest = insRows[0];
    const expiry = latest.values[CONFIG.COLUMNS.docExpiry];
    const days   = daysUntil(expiry);
    const tone   = statusTone(days);
    const label  = days < 0  ? `Expired ${Math.abs(days)} days ago`
                 : days === 0 ? "Expires today"
                 : `Expires in ${days} day${days===1?"":"s"}`;

    document.getElementById("val-insurance").textContent = `Renewal: ${fmt(expiry)}`;
    document.getElementById("badge-insurance").innerHTML = badge(label, tone);
    setCard("insurance");
  } catch(e) {
    setError("insurance", `Could not load — ${e.message}`);
  }
}

// ── 3. BWOF Status ────────────────────────────────────────────
async function loadBWOF() {
  try {
    const rows = await fetchRows(CONFIG.TABLE_PROPERTIES);
    document.getElementById("card-bwof").href = CONFIG.LINKS.bwof;

    // Find the HVA property row by property code abbreviation
    const propRow = rows.find(r =>
      String(r.values[CONFIG.COLUMNS.propertyCode] || "").includes("HVA") ||
      String(r.values["Property ID"] || "").includes(CONFIG.PROPERTY_CODE)
    );

    if (!propRow) {
      setError("bwof", "Property row not found");
      return;
    }

    const expiry = propRow.values[CONFIG.COLUMNS.bwofExpiry];
    if (!expiry) {
      document.getElementById("val-bwof").textContent = "No BWOF expiry date on file";
      document.getElementById("badge-bwof").innerHTML = badge("⚠️ No date set", "amber");
      setCard("bwof");
      return;
    }

    const days  = daysUntil(expiry);
    const tone  = statusTone(days);
    const label = days < 0  ? `Expired ${Math.abs(days)} days ago`
                : days === 0 ? "Expires today"
                : days <= 30 ? `Renew within ${days} day${days===1?"":"s"}`
                : "On track";

    document.getElementById("val-bwof").textContent = `BWOF renewal: ${fmt(expiry)}`;
    document.getElementById("badge-bwof").innerHTML = badge(label, tone);
    setCard("bwof");
  } catch(e) {
    setError("bwof", `Could not load — ${e.message}`);
  }
}

// ── 4. LTMP Review Due ────────────────────────────────────────
// LTMP lives in Reports Table (local), not Properties Master
async function loadLTMP() {
  try {
    const rows = await fetchRows(CONFIG.TABLE_REPORTS);
    document.getElementById("card-ltmp").href = CONFIG.LINKS.ltmp;

    // Filter to LTMP reports, pick most recent by Report date
    const ltmpRows = rows
      .filter(r => String(r.values[CONFIG.COLUMNS.reportType] || "")
        .toLowerCase().includes("long term maintenance"))
      .sort((a,b) => new Date(b.values[CONFIG.COLUMNS.reportDate]) 
                   - new Date(a.values[CONFIG.COLUMNS.reportDate]));

    if (!ltmpRows.length) {
      document.getElementById("val-ltmp").textContent = "No LTMP report on file";
      document.getElementById("badge-ltmp").innerHTML = badge("⚠️ No report found", "amber");
      setCard("ltmp");
      return;
    }

    const reviewDate = ltmpRows[0].values[CONFIG.COLUMNS.ltmpReview];
    if (!reviewDate) {
      document.getElementById("val-ltmp").textContent = "LTMP report found — no review date set";
      document.getElementById("badge-ltmp").innerHTML = badge("⚠️ No review date", "amber");
      setCard("ltmp");
      return;
    }

    const days  = daysUntil(reviewDate);
    const tone  = days < 0 ? "red" : days < 365 ? "amber" : "green";
    const label = days < 0  ? `Overdue by ${Math.abs(days)} days`
                : days < 30 ? `Due in ${days} day${days===1?"":"s"}`
                : "On track";

    document.getElementById("val-ltmp").textContent = `LTMP review due: ${fmt(reviewDate)}`;
    document.getElementById("badge-ltmp").innerHTML = badge(label, tone);
    setCard("ltmp");
  } catch(e) {
    setError("ltmp", `Could not load — ${e.message}`);
  }
}

// ── Demo mode (runs when API_TOKEN is placeholder) ────────────
function runDemo() {
  // Simulate what real data looks like using values from your screenshots
  setTimeout(() => {
    // Meeting
    document.getElementById("card-meeting").href = "#";
    document.getElementById("val-meeting").textContent = "yearly unit owners general meeting — 19 Mar 2026, 5:00 PM";
    document.getElementById("sub-meeting").innerHTML = badge("Notice period passed — send immediately", "red");
    document.getElementById("card-meeting").classList.remove("loading");

    // Insurance
    document.getElementById("card-insurance").href = "#";
    document.getElementById("val-insurance").textContent = "No insurance document with expiry date on file";
    document.getElementById("badge-insurance").innerHTML = badge("⚠️ Attention needed", "amber");
    document.getElementById("card-insurance").classList.remove("loading");

    // BWOF
    document.getElementById("card-bwof").href = "#";
    document.getElementById("val-bwof").textContent = "BWOF renewal: 15 Aug 2026";
    document.getElementById("badge-bwof").innerHTML = badge("On track", "green");
    document.getElementById("card-bwof").classList.remove("loading");

    // LTMP
    document.getElementById("card-ltmp").href = "#";
    document.getElementById("val-ltmp").textContent = "LTMP review due: 30 Apr 2027";
    document.getElementById("badge-ltmp").innerHTML = badge("On track", "green");
    document.getElementById("card-ltmp").classList.remove("loading");
  }, 600);
}

// ── Boot ──────────────────────────────────────────────────────
// Demo mode runs only when token is still placeholder
if (CONFIG.API_TOKEN === "YOUR_READ_ONLY_CODA_TOKEN") {
  runDemo();
} else {
  // Debug: list all tables first to verify names
  fetch(`https://coda.io/apis/v1/docs/${CONFIG.DOC_ID}/tables?limit=200`, { headers: headers() })
    .then(r => r.json())
    .then(data => {
      const rows = (data.items || []).map(t => t.name + " → " + t.id);
      const debug = document.createElement("div");
      debug.style = "font-size:11px;color:#555;padding:10px 14px;background:#f0ede6;border-radius:8px;margin-top:10px;font-family:monospace;line-height:1.9;";
      debug.innerHTML = "<strong>Tables (name → id):</strong><br>" + rows.join("<br>");
      document.body.appendChild(debug);
    });
  // Extra debug: show exact name match attempt for LTMP table
  fetch(`${BASE}/docs/${CONFIG.DOC_ID}/tables?limit=200`, { headers: headers() })
    .then(r => r.json())
    .then(data => {
      const target = CONFIG.TABLE_REPORTS;
      const all = (data.items || []).map(t => t.name);
      const exact = all.filter(n => n === target);
      const partial = all.filter(n => n.toLowerCase().includes("report"));
      const debug2 = document.createElement("div");
      debug2.style = "font-size:11px;color:#333;padding:10px 14px;background:#e8f4e8;border-radius:8px;margin-top:6px;font-family:monospace;line-height:1.9;";
      debug2.innerHTML = `<strong>Looking for:</strong> "${target}" (${target.length} chars)<br>`
        + `<strong>Exact matches:</strong> ${exact.length ? exact.join(", ") : "NONE"}<br>`
        + `<strong>Partial matches (report):</strong> ${partial.join(" | ") || "NONE"}`;
      document.body.appendChild(debug2);
    });
  Promise.all([loadMeeting(), loadInsurance(), loadBWOF(), loadLTMP()]);
}
</script>
